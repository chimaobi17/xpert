version: '3.8'

services:
  # Backend API (Laravel)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=xpert
      - DB_USERNAME=xpert_user
      - DB_PASSWORD=xpert_password
    depends_on:
      - db

  # Database (MySQL)
  db:
    image: mysql:8.0
    ports:
      - "33061:3306"
    environment:
      - MYSQL_DATABASE=xpert
      - MYSQL_USER=xpert_user
      - MYSQL_PASSWORD=xpert_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - db_data:/var/lib/mysql

  # Frontend (React/Vite)
  frontend:
    image: node:20-alpine
    working_dir: /app/xpert-app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api

volumes:
  db_data:
