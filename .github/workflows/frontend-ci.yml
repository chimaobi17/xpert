name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: xpert-app

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: xpert-app/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Build Check
      run: npm run build
      env:
        VITE_API_BASE_URL: https://xpert-api.onrender.com/api
