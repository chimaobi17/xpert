apiVersion: apps/v1
kind: Deployment
metadata:
  name: xpert-api
  labels:
    app: xpert-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: xpert-api
  template:
    metadata:
      labels:
        app: xpert-api
    spec:
      containers:
        - name: xpert-api
          image: xpert-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: xpert-config
            - secretRef:
                name: xpert-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
