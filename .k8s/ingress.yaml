apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xpert-api-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.xpert.app
      secretName: xpert-api-tls
  rules:
    - host: api.xpert.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: xpert-api-service
                port:
                  number: 80
